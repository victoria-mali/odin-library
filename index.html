<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Library</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
          <h1>The Library</h1>  
          <div class="library"></div>
<!-- 
          <button class="new-book" command="show-modal" commandfor="my-dialog">Add new book</button>
          <dialog id="my-dialog">
            <p>This dialog was opened using an invoker command.</p>
            <button commandfor="my-dialog" command="close">Close</button>
            </dialog> -->


            <!-- A modal dialog containing a form -->
            <dialog id="favDialog">
            <form method="dialog">
                <h2>Enter book details</h2>

                <p>
                <label>
                   Book title
                    <input type="text" name="title" id="form-title" required/>
                </label>
                </p>

                <p>
                <label>
                   Author
                    <input type="text" name="author" id="form-author" required/>
                </label>
                </p>


                <p>
                <label>
                   Number of pages
                    <input type="number" name="pages" id="form-pages" required/>
                </label>
                </p>

                <p>
                <label>
                   Already read?
                    <input type="checkbox" name="if-read" id="form-read"/>
                </label>
                </p>


                <div>
                <button value="cancel" formmethod="dialog">Cancel</button>
                <button id="confirmBtn" value="default">Confirm</button>
                </div>
            </form>
            </dialog>
            <p>
            <button id="showDialog">Add a new book</button>
            </p>
            <output></output>
                </div>


</body>
</html>
